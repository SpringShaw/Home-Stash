<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - Home Stash</title>
<script src="/static/lib/tailwindcss.js"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
</style>
</head>
<body class="bg-gradient-to-br from-teal-600 via-emerald-500 to-green-400 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-20 h-20 mx-auto mb-4 rounded-full bg-gradient-to-br from-teal-500 to-emerald-400 shadow-lg overflow-hidden ring-4 ring-white flex items-center justify-center">
        <span class="text-4xl">🏠</span>
      </div>
      <h1 data-i18n="loginTitle" class="text-2xl font-bold text-gray-800">家庭耗材库存管理</h1>
      <p class="text-sm text-gray-500 mt-1">Home Stash</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label data-i18n="account" class="block text-sm font-medium text-gray-700 mb-1">账号</label>
        <input type="text" name="account" required
          data-i18n-placeholder="accountPlaceholder"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
          placeholder="请输入账号">
      </div>
      <div>
        <label data-i18n="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input type="password" name="password" required
          data-i18n-placeholder="passwordPlaceholder"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-transparent outline-none"
          placeholder="请输入密码">
      </div>
      <div id="errorMsg" class="hidden text-red-500 text-sm text-center"></div>
      <button type="submit" id="submitBtn" data-i18n="loginBtn"
        class="w-full bg-gradient-to-r from-teal-600 to-emerald-500 text-white py-3 rounded-lg font-medium hover:from-teal-700 hover:to-emerald-600 transition active:scale-95">
        登 录
      </button>
    </form>
    <div data-i18n="loginTip" class="mt-6 text-center text-xs text-gray-400">
      💡 不同账户操作均会记录留痕
    </div>
    <div class="mt-3 text-center">
      <button type="button" id="langToggleBtn" class="text-xs text-gray-400 hover:text-gray-600 underline">English</button>
    </div>
    <div id="currentIp" class="mt-2 text-center text-xs text-gray-300"></div>
  </div>
<script>
// ===== i18n =====
const LANG_KEY = 'home_stash_lang';
const loginI18n = {
  zh: {
    loginTitle: '家庭耗材库存管理',
    account: '账号',
    password: '密码',
    accountPlaceholder: '请输入账号',
    passwordPlaceholder: '请输入密码',
    loginBtn: '登 录',
    loginTip: '💡 不同账户操作均会记录留痕',
    loginFailed: '登录失败',
    networkError: '网络错误',
    currentIp: '当前IP: ',
    langToggle: 'English'
  },
  en: {
    loginTitle: 'Home Inventory Manager',
    account: 'Account',
    password: 'Password',
    accountPlaceholder: 'Enter your account',
    passwordPlaceholder: 'Enter your password',
    loginBtn: 'Sign In',
    loginTip: '💡 All account actions are logged',
    loginFailed: 'Login failed',
    networkError: 'Network error',
    currentIp: 'Current IP: ',
    langToggle: '中文'
  }
};

let loginLang = localStorage.getItem(LANG_KEY);
if (!loginLang) {
  loginLang = (navigator.language || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';
}

function lt(key) {
  return (loginI18n[loginLang] || loginI18n.zh)[key] || key;
}

function applyLoginLang() {
  document.documentElement.lang = loginLang === 'zh' ? 'zh-CN' : 'en';
  document.title = loginLang === 'zh' ? '登录 - Home Stash' : 'Sign In - Home Stash';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = lt(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = lt(el.dataset.i18nPlaceholder);
  });
  document.getElementById('langToggleBtn').textContent = lt('langToggle');
}

document.getElementById('langToggleBtn').addEventListener('click', () => {
  loginLang = loginLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem(LANG_KEY, loginLang);
  applyLoginLang();
});

applyLoginLang();

// ===== Login logic =====
(async function() {
  try {
    const r = await fetch('/api/trusted-check');
    const data = await r.json();
    if (data.ip) {
      document.getElementById('currentIp').textContent = lt('currentIp') + data.ip;
    }
    if (data.trusted) {
      location.href = '/';
      return;
    }
  } catch(e) {}

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = loginLang === 'zh' ? '登录中...' : 'Signing in...';

    const fd = new FormData(form);
    try {
      const res = await fetch('/api/login', { method: 'POST', body: fd });
      if (res.ok) {
        location.href = '/';
      } else {
        const data = await res.json();
        errorMsg.textContent = data.detail || lt('loginFailed');
        errorMsg.classList.remove('hidden');
      }
    } catch (err) {
      errorMsg.textContent = lt('networkError');
      errorMsg.classList.remove('hidden');
    } finally {
      btn.disabled = false;
      btn.textContent = lt('loginBtn');
    }
  });
})();
</script>
</body>
</html>
